name: Run Julia Tests

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: "0 0 * * *"  # Run every day at midnight
permissions:
  contents: write

# cancel runs for pull requests on force push
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.package }} - Julia ${{ matrix.julia-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package:
          - ToolsForCategoricalTowers
          - QuotientCategories
          - FpCategories
          - FpLinearCategories
          - Locales
          - SubcategoriesForCAP
          - PresheafCategories
          - FiniteCocompletions
          - FunctorCategories
        julia-version:
          - '1.12'
          - 'nightly'
        os:
          - ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}
      - name: Install all packages
        run: make install
      - name: Run tests
        run: make -C ${{ matrix.package }} test

  update_subsplits:
    name: Update subsplits
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - name: Install all packages
        run: make install
      - name: Run update_subsplits script
        env:
          JULIA_SUBSPLIT_TOKEN: ${{ secrets.SUBSPLIT_PUSH_SECRET }}
        run: |
          ./dev/update_subsplits.sh
